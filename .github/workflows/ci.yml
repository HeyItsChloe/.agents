name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate agent files
      run: |
        echo "Validating agent files..."
        
        # Check all agent files exist
        for agent in repo-auditor template-resolver agent-generator skill-generator automation-registrar pipeline-committer; do
          if [ ! -f ".agents/agents/$agent.md" ]; then
            echo "Missing agent: $agent"
            exit 1
          fi
        done
        
        # Check all universal agent templates exist
        for template in ticket-planner code-implementer tester pr-reviewer ticket-manager; do
          if [ ! -f ".agents/templates/agents/$template.md" ]; then
            echo "Missing agent template: $template"
            exit 1
          fi
        done
        
        # Check all universal skill templates exist
        for skill in env-setup ci-monitor whatsapp-notifier; do
          if [ ! -f ".agents/templates/skills/$skill.md" ]; then
            echo "Missing skill template: $skill"
            exit 1
          fi
        done
        
        echo "✅ All required files present"
        
    - name: Validate automation config
      run: |
        if [ ! -f ".agents/automations/pipeline-generator.md" ]; then
          echo "Missing automation config"
          exit 1
        fi
        echo "✅ Automation config present"
        
    - name: Check for required sections in agents
      run: |
        for agent in .agents/agents/*.md; do
          if ! grep -q "## Process" "$agent"; then
            echo "Missing Process section in: $agent"
            exit 1
          fi
          if ! grep -q "## Next Step" "$agent"; then
            echo "Missing Next Step section in: $agent"
            exit 1
          fi
        done
        echo "✅ All agents have required sections"